</head>

  <div style="display:flex; align-items:center;">
    <a href="cart.html" class="nav-cart" style="margin-right:20px;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>

</div>

<!-- RESET PASSWORD SECTION -->
<section class="auth-section">
  <div class="auth-container reveal">
    <!-- Image/Brand side -->
    <div class="auth-visual">
      <img src="images/artisan_working.png" alt="Artisan background" onerror="this.src='images/travel-experince-4.jpg'" />
      <div class="auth-visual-overlay"></div>
      <div class="auth-visual-content">
        <h2>Secure Your Account</h2>
        <p>Please enter a new password to secure your account.</p>
      </div>
    </div>
    
    <!-- Form side -->
    <div class="auth-form-wrapper">
      <form id="form-reset-password" class="auth-form active">
        <h3 class="auth-title">Create New Password</h3>
        <p class="auth-subtitle">Enter your new password below</p>
        
        <div class="form-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" required placeholder="•••••••• (Min 6 chars)" minlength="6" />
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" required placeholder="••••••••" minlength="6" />
        </div>
        
        <button type="submit" id="btn-update-password" class="btn btn-primary auth-submit">Update Password</button>
        <div class="auth-message" id="reset-message"></div>
      </form>
    </div>
  </div>
</section>

<!-- TOAST OVERLAY -->
<div id="toast-overlay" class="toast-overlay"></div>


<script src="modules/ui.js"></script>
<script src="modules/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/reset-password.js"></script>
